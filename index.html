<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识库</title>
<style>
:root{--bg:#f4f6f9;--bg2:#e8ecf1;--card:#ffffff;--card2:#f9fafb;--text:#1e293b;--text2:#64748b;--text3:#94a3b8;--pri:#2563eb;--pri2:#60a5fa;--pri-bg:#eff6ff;--acc:#c9a55a;--acc2:#d4af5e;--acc-bg:#fef9f0;--ok:#16a34a;--ok-bg:#f0fdf4;--warn:#b45309;--warn-bg:#fff7ed;--err:#dc2626;--err-bg:#fef2f2;--info:#2563eb;--info-bg:#eff6ff;--bdr:#e2e8f0;--sh:rgba(0,0,0,.06);--sh1:0 1px 2px rgba(0,0,0,.05),0 1px 3px rgba(0,0,0,.04);--sh2:0 4px 6px rgba(0,0,0,.06),0 2px 4px rgba(0,0,0,.04);--sh3:0 10px 20px rgba(0,0,0,.04),0 4px 8px rgba(0,0,0,.03);--ease:cubic-bezier(.4,0,.2,1);--r:10px;--rs:6px;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;--serif:Georgia,"Noto Serif SC",serif}
[data-theme=dark]{--bg:#0f1419;--bg2:#1a2030;--card:#1e2738;--card2:#243044;--text:#e0ddd5;--text2:#a0a0a0;--text3:#707070;--pri:#c9a55a;--pri2:#3a5a8a;--pri-bg:#2a2518;--acc:#c9a55a;--acc2:#c9a55a;--acc-bg:#2a2518;--ok:#2d8a4e;--err:#c0392b;--warn:#b8860b;--info:#2980b9;--bdr:#2a3548;--sh:rgba(0,0,0,.3);--ok-bg:#1a2e20;--warn-bg:#2e2a18;--err-bg:#2e1a18;--info-bg:#182a2e;--sh1:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);--sh2:0 4px 6px rgba(0,0,0,.25),0 2px 4px rgba(0,0,0,.15);--sh3:0 10px 25px rgba(0,0,0,.3),0 4px 10px rgba(0,0,0,.2)}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}.hd-t,.hero h1,.hero p,.hero .h-stats,.sec-h,.ft{user-select:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}

/* ===== HEADER ===== */
.hd{position:fixed;top:0;left:0;right:0;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100;background:var(--card);border-bottom:1px solid var(--bdr);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.hd-l{display:flex;align-items:center;gap:10px}
.hd-l svg{width:24px;height:24px;flex-shrink:0}
.hd-t{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.hd-t span{color:var(--acc)}
.hd-r{display:flex;align-items:center;gap:8px}
.hb{width:34px;height:34px;border-radius:8px;border:1px solid var(--bdr);background:var(--card);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;user-select:none}
.hb:hover{background:var(--bg2);color:var(--text)}.hb:active{transform:scale(.92)}
.hb svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

/* ===== HERO ===== */
.mn{flex:1;margin-top:56px;display:flex;flex-direction:column;align-items:center;padding:0 20px}
.hero{text-align:center;padding:60px 0 40px;max-width:640px}
.hero .h-icon{width:64px;height:64px;border-radius:16px;background:var(--pri-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px}
.hero h1{font-size:28px;font-weight:700;color:var(--text);margin-bottom:10px;letter-spacing:-.5px}
.hero p{font-size:15px;color:var(--text2);line-height:1.8}
.hero .h-stats{display:flex;gap:24px;justify-content:center;margin-top:24px}
.hero .h-stats div{text-align:center}
.hero .h-stats .n{font-size:24px;font-weight:700;color:var(--pri);font-family:var(--serif)}
.hero .h-stats .l{font-size:12px;color:var(--text3);margin-top:2px}

/* ===== BOOK CARDS ===== */
.sec{width:100%;max-width:960px;padding-bottom:60px}
.sec-h{display:flex;align-items:center;gap:10px;padding:0 4px 16px;font-size:13px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--bdr);margin-bottom:16px}
.sec-h svg{width:16px;height:16px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

.bk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.bk{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;cursor:pointer;transition:.2s var(--ease);user-select:none;text-decoration:none;color:inherit;display:block;position:relative;overflow:hidden}
.bk::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--acc);opacity:0;transition:opacity .2s}
.bk:hover{box-shadow:var(--sh2);transform:translateY(-2px);border-color:var(--acc)}
.bk:hover::before{opacity:1}.bk:active{transform:scale(.98)}
.bk .bk-ic{width:40px;height:40px;border-radius:10px;background:var(--pri-bg);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px}
.bk .bk-t{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.bk .bk-d{font-size:13px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.bk .bk-m{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:11px;color:var(--text3)}
.bk .bk-m svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

/* ===== FOOTER ===== */
.ft{text-align:center;padding:24px;font-size:12px;color:var(--text3);border-top:1px solid var(--bdr)}

/* ===== RESPONSIVE ===== */
@media(max-width:640px){
  .hd{padding:0 14px}.hero{padding:40px 0 28px}.hero h1{font-size:24px}
  .bk-grid{grid-template-columns:1fr}.hero .h-stats{gap:16px}
  .sec{max-width:100%}
}
</style>
</head>
<body>

<header class="hd">
  <div class="hd-l">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5" fill="var(--acc)"/><rect x="14" y="3" width="7" height="7" rx="1.5" fill="var(--pri)"/><rect x="3" y="14" width="7" height="7" rx="1.5" fill="var(--pri)" opacity=".5"/><rect x="14" y="14" width="7" height="7" rx="1.5" fill="var(--acc)" opacity=".5"/></svg>
    <span class="hd-t">知识<span>库</span></span>
  </div>
  <div class="hd-r">
    <button class="hb" onclick="tgTh()" title="切换主题" id="thBtn"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg></button>
  </div>
</header>

<main class="mn">
  <section class="hero">
    <div class="h-icon">📖</div>
    <h1>知识库</h1>
    <p>精选技术书籍与学习资料，系统化掌握核心知识。<br>选择一个分类开始探索。</p>
    <div class="h-stats"><div><div class="n" id="stG">0</div><div class="l">分类</div></div><div><div class="n" id="stB">0</div><div class="l">书籍</div></div></div>
  </section>

  <section class="sec" id="secList"></section>
</main>

<footer class="ft">© 知识库 · 持续更新中</footer>

<script>
const THEME_KEY = 'wk-nav-theme';
let THEME = localStorage.getItem(THEME_KEY) || 'light';
if (THEME === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

function tgTh() {
  THEME = THEME === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', THEME === 'dark' ? 'dark' : '');
  localStorage.setItem(THEME_KEY, THEME);
}

const SITEMAP_PATH = './sitemap.json';

// Group → book name/desc mapping
const BOOK_META = {
  '股票交易': { icon: '📈', desc: '股票交易技术分析方法与实战策略' }
};

function descFor(name) {
  return BOOK_META[name]?.desc || '';
}

function iconFor(name) {
  return BOOK_META[name]?.icon || '📄';
}

async function init() {
  try {
    const res = await fetch(SITEMAP_PATH);
    const sitemap = await res.json();
    renderHeroStats(sitemap);
    renderSections(sitemap);
  } catch (e) {
    document.getElementById('secList').innerHTML =
      `<div style="text-align:center;padding:60px 20px;color:var(--text3)"><p style="font-size:40px;margin-bottom:12px">📭</p><p>暂无内容，请先添加书籍</p></div>`;
  }
}

function renderHeroStats(sitemap) {
  const groups = sitemap.length;
  const books = sitemap.reduce((s, g) => s + g.files.length, 0);
  document.getElementById('stG').textContent = groups;
  document.getElementById('stB').textContent = books;
}

function renderSections(sitemap) {
  let h = '';
  sitemap.forEach(g => {
    h += `<div style="margin-bottom:28px">`;
    h += `<div class="sec-h"><svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>${g.name}</div>`;
    h += `<div class="bk-grid">`;
    g.files.forEach(f => {
      const desc = descFor(g.name);
      h += `<a class="bk" href="${escAttr(f.path)}">`;
      h += `<div class="bk-ic">${iconFor(g.name)}</div>`;
      h += `<div class="bk-t">${escHtml(f.name)}</div>`;
      h += `<div class="bk-d">${desc || '点击进入学习'}</div>`;
      h += `<div class="bk-m"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>${f.path}</div>`;
      h += `</a>`;
    });
    h += `</div></div>`;
  });
  document.getElementById('secList').innerHTML = h;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

init();
</script>
</body>
</html>
